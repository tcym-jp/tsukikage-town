<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#17233f" />
    <title>月影町・オフライン</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        color: #302d2a;
        background: #10182d;
        font-family: 'Yu Gothic', sans-serif;
      }
      .paper {
        width: min(100%, 560px);
        box-sizing: border-box;
        padding: 48px;
        background: #f0e7cf;
        border: 1px solid #b49f77;
        box-shadow: 0 20px 70px #0008;
      }
      h1 {
        font-family: 'Yu Mincho', serif;
        letter-spacing: 0.12em;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        padding: 0 18px;
        color: #fff;
        background: #334f79;
        text-decoration: none;
      }
      .rule {
        color: #334f79;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <main class="paper">
      <p class="rule">月影町の規則</p>
      <h1>列車が止まっています</h1>
      <p>
        現在はネットワークへ接続できません。一度遊んだ端末では、接続が戻るまでタイトルと保存済みの記録を閲覧できます。
      </p>
      <p>この画面だけが表示される場合は、接続後に一度ゲームを開いてください。</p>
      <a href="/">月影町へ戻る</a>
    </main>
  </body>
</html>
